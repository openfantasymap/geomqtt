name: pages

on:
  push:
    branches: [main]
    paths:
      - "examples/web-iss/**"
      - "clients/geomqtt-core/**"
      - "clients/geomqtt-maplibre/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build client packages
        working-directory: clients
        run: |
          npm install
          npm run build

      - name: Install + build web demo
        working-directory: examples/web-iss
        run: |
          npm install
          npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: examples/web-iss/public

      - id: deployment
        uses: actions/deploy-pages@v4
